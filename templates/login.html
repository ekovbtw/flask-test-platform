{% extends 'base.html' %}

{% block title %}
Вход
{% endblock %}

{% block body %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <h1 class="text-center mb-4">Вход</h1>

        <form method="post">

            <div class="mb-3">
                <label class="form-label">Логин</label>
                <input 
                    type="text" 
                    name="username" 
                    class="form-control" 
                    placeholder="Введите логин"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input 
                    type="password" 
                    name="password" 
                    class="form-control" 
                    placeholder="Введите пароль"
                    required
                >
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    Войти
                </button>
            </div>

        </form>

        <p class="text-center mt-3">
            Нет аккаунта? <a href="/sign_up">Зарегистрироваться</a>
        </p>

    </div>
</div>

{% endblock %}
