{% extends 'base.html' %}

{% block title %}
Профиль
{% endblock %}

{% block body %}

<div class="row justify-content-center">
    <div class="col-md-6 text-center">

        <h1 class="mb-4">Профиль пользователя</h1>

        <img 
            src="{{ url_for('static', filename='img/user_logo.png') }}"
            class="img-fluid rounded-circle"
            style="max-width:150px;">

        <h3>{{ user.username }}</h3>

        <p class="text-muted">
            Роль:
            <strong>
                {% if user.role == "student" %}
                    Студент
                {% elif user.role == "teacher" %}
                    Преподаватель
                {% else %}
                    {{ user.role }}
                {% endif %}
            </strong>
        </p>

    </div>
</div>

{% endblock %}
